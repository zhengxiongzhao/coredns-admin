services:
  coredns-admin:
    # image: zhengxiongzhao/coredns-admin:latest
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      # Backend Environment
      - ADMIN_USERNAME=${ADMIN_USERNAME:-admin}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-admin123}
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - admin-data:/app/data
    networks:
      - coredns-network

  coredns:
    image: coredns/coredns:1.13.1
    restart: unless-stopped
    ports:
      - "5053:53/tcp"
      - "5053:53/udp"
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - ./etc/Corefile:/etc/coredns/Corefile:ro
    command: -conf /etc/coredns/Corefile
    networks:
      - coredns-network

  etcd:
    image: quay.io/coreos/etcd:v3.5.9
    restart: unless-stopped
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - etcd-data:/etcd-data
    command:
      - /usr/local/bin/etcd
      - --name
      - etcd0
      - --data-dir
      - /etcd-data
      - --listen-client-urls
      - http://0.0.0.0:2379
      - --advertise-client-urls
      - http://0.0.0.0:2379
      - --listen-peer-urls
      - http://0.0.0.0:2380
      - --initial-advertise-peer-urls
      - http://0.0.0.0:2380
      - --initial-cluster
      - etcd0=http://0.0.0.0:2380
      - --initial-cluster-token
      - etcd-cluster-1
      - --initial-cluster-state
      - new
      - --auto-compaction-mode
      - periodic
      - --auto-compaction-retention
      - 5h
    ports:
      - "2379:2379"
      - "2380:2380"
    networks:
      - coredns-network

volumes:
  etcd-data:
    driver: local
  admin-data:
    driver: local

networks:
  coredns-network:
    driver: bridge
